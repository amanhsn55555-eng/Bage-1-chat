    /* تحميل وتوست */
  
    .loading {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    .spinner {
      background: white;
      padding: 28px 32px;

    }
    .spinner i {
      font-size: 40px;
      color: #fbbf24;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0%{transform:rotate(0);} 100%{transform:rotate(360deg);} }

    .toast {
      position: fixed;

<body>

<div class="main-wrapper">

<div style="display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#10b981,#059669);padding:8px 16px;border-radius:40px;box-shadow:0 8px 20px rgba(16,185,129,0.3),inset 0 1px 0 rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.3);"><i class="fas fa-user-check" style="color:white;font-size:16px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.2));"></i><span style="color:white;font-weight:700;font-size:14px;text-shadow:0 2px 4px rgba(0,0,0,0.15);">متواجدون الآن</span></div>
      <!-- نموذج التسجيل (بريد ورمز سري فقط) -->

          <input type="email" id="regEmail" placeholder="البريد الالكتروني" dir="ltr">

          <input type="password" id="regPassword" placeholder="كلمة المرور">

<!-- Firebase & Script -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDYKCCTcurNcJslrNKqdiJCoIIK-YZArB4",
    authDomain: "sbaq-fc46f.firebaseapp.com",
    projectId: "sbaq-fc46f",
    storageBucket: "sbaq-fc46f.firebasestorage.app",
    appId: "1:1026865750415:web:0ee39a717bcafaa0d06bfa"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const TARGET_URL = "https://amanhsn55555-eng.github.io/Bage-2-chat/";

  const loginSection = document.getElementById('loginSection');
  const registerSection = document.getElementById('registerSection');
  const loadingOverlay = document.getElementById('loadingOverlay');
  const toast = document.getElementById('toastMsg');

  const loginEmail = document.getElementById('loginEmail');
  const loginPassword = document.getElementById('loginPassword');
  const loginBtn = document.getElementById('loginBtn');
  const regEmail = document.getElementById('regEmail');
  const regPassword = document.getElementById('regPassword');
  const registerBtn = document.getElementById('registerBtn');

  function showToastMsg(msg, isSuccess = true) {
    toast.textContent = msg;
    toast.style.background = isSuccess ? '#10b981' : '#ef4444';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function showLoading(show) {
    loadingOverlay.style.display = show ? 'flex' : 'none';
  }

  function clearErrors() {
    document.querySelectorAll('.error-msg').forEach(el => { el.style.display = 'none'; });
    document.querySelectorAll('input').forEach(i => i.classList.remove('error'));
  }

  function showFieldError(fieldId, msg) {
    const field = document.getElementById(fieldId);
    const err = document.getElementById(fieldId + 'Error');
    if(field) field.classList.add('error');
    if(err) { err.textContent = msg; err.style.display = 'block'; }
  }

  function generateId() {
    return Math.floor(100000 + Math.random() * 900000).toString();
  }

  function redirectToTarget() {
    window.location.href = TARGET_URL;
  }

  async function handleLogin() {
    clearErrors();
    const email = loginEmail.value.trim();
    const pass = loginPassword.value;
    let valid = true;
    if (!email) { showFieldError('loginEmail', 'البريد مطلوب'); valid = false; }
    if (!pass) { showFieldError('loginPassword', 'كلمة المرور مطلوبة'); valid = false; }
    if (!valid) return;

    showLoading(true);
    try {
      await signInWithEmailAndPassword(auth, email, pass);
      showToastMsg('تم الدخول بنجاح، جاري التحويل...');
      setTimeout(() => { redirectToTarget(); }, 800);
    } catch (err) {
      let msg = 'بيانات الدخول غير صحيحة';
      if (err.code === 'auth/user-not-found') msg = 'الحساب غير موجود';
      else if (err.code === 'auth/wrong-password') msg = 'كلمة مرور خاطئة';
      showToastMsg(msg, false);
    } finally {
      showLoading(false);
    }
  }

  async function handleRegister() {
    clearErrors();
    const email = regEmail.value.trim();
    const pass = regPassword.value;
    let valid = true;
    if (!email) { showFieldError('regEmail', 'البريد مطلوب'); valid = false; }
    if (!pass || pass.length < 6) { showFieldError('regPassword', '6 أحرف على الأقل'); valid = false; }
    if (!valid) return;

    showLoading(true);
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      const userId = generateId();
      const userData = {
        uid: cred.user.uid,
        email: email,
        name: 'مستخدم',
        userId: userId,
        emoji: '😎',
        createdAt: new Date().toISOString()
      };
      try {
        await setDoc(doc(db, "users", cred.user.uid), userData);
        await setDoc(doc(db, "users_by_id", userId), { uid: cred.user.uid });
        await setDoc(doc(db, "resources", cred.user.uid), { gold: 10, money: 1000 });
      } catch (e) { /* تجاهل */ }

      showToastMsg('تم إنشاء الحساب، جاري التحويل...');
      setTimeout(() => { redirectToTarget(); }, 800);
    } catch (err) {
      let msg = 'فشل التسجيل';
      if (err.code === 'auth/email-already-in-use') msg = 'البريد مستخدم مسبقاً';
      showToastMsg(msg, false);
    } finally {
      showLoading(false);
    }
  }

  document.getElementById('showRegisterLink').addEventListener('click', (e) => {
    e.preventDefault();
    loginSection.style.display = 'none';
    registerSection.style.display = 'block';
    clearErrors();
  });

  document.getElementById('showLoginLink').addEventListener('click', (e) => {
    e.preventDefault();
    registerSection.style.display = 'none';
    loginSection.style.display = 'block';
    clearErrors();
  });

  loginBtn.addEventListener('click', handleLogin);
  registerBtn.addEventListener('click', handleRegister);

  loginPassword.addEventListener('keypress', (e) => { if(e.key==='Enter') handleLogin(); });
  regPassword.addEventListener('keypress', (e) => { if(e.key==='Enter') handleRegister(); });
</script>
</body>
